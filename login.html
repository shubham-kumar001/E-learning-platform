<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Login | EduLearn</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="card fade-in">
    <h2>Student Login</h2>
    <input id="name" placeholder="Full Name">
    <input id="email" placeholder="College Email (@cutm.ac.in)">
    <input id="mobile" placeholder="Mobile Number">
    <input id="password" type="password" placeholder="Password">
    
    <button class="btn" onclick="login()">Submit</button>
    <button id="nextBtn" class="btn" style="display:none;" onclick="next('preference.html')">Next →</button>
</div>

<script src="js/script.js"></script>
</body>
</html>
